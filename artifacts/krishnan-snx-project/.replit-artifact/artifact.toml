kind = "web"
previewPath = "/"
title = "KRISHNAN_SNX_PROJECT"
version = "1.0.0"
id = "artifacts/krishnan-snx-project"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21776

[services.development]
run = "pnpm --filter @workspace/krishnan-snx-project run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/krishnan-snx-project", "run", "build" ]
