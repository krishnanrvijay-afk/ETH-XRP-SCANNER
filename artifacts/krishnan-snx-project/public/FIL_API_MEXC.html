<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FIL API · MEXC DEMO</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&display=swap');

  :root {
    --bg:       #05080b;
    --surface:  #0a0f14;
    --card:     #0e1519;
    --border:   #162028;
    --green:    #00e676;
    --yellow:   #ffd740;
    --red:      #ff3d3d;
    --blue:     #00c8ff;
    --purple:   #b388ff;
    --muted:    #4a6272;
    --text:     #ddeeff;
    --white:    #f0f8ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px; min-height: 100vh; }

  .tab-bar { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .tab { flex: 1; padding: 12px 6px; text-align: center; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }
  .tab-content { display: none; padding: 10px; }
  .tab-content.active { display: block; }

  .hdr { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
  .hdr-left { display: flex; align-items: center; gap: 10px; }
  .hdr-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: #ffffff; font-weight: 700; }
  .hdr-title span { color: var(--blue); }
  .clear-btn { background: rgba(255,61,61,0.12); border: 1px solid rgba(255,61,61,0.3); color: var(--red); padding: 4px 10px; border-radius: 4px; font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 1px; cursor: pointer; }
  .hdr-right { text-align: right; }
  .hdr-clock { font-size: 24px; font-weight: 700; color: var(--yellow); }
  .hdr-session { font-size: 10px; color: #ffffff; margin-top: 1px; font-weight: 700; }
  .live-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-right: 4px; animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* ── SESSION BAR ── */
  .session-bar { display: flex; gap: 3px; margin-bottom: 6px; }
  .session-seg { flex: 1; height: 30px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 1.2px; text-transform: uppercase; }
  .session-seg.prime   { outline: 2px solid var(--green); }
  .session-seg.evening { outline: 2px solid var(--blue); }
  .session-seg.risk    { outline: 2px solid var(--red); }
  .session-seg.now     { outline: 2px solid var(--yellow); }

  /* ── BEST TRADING HOURS (per card) ── */
  .best-hours-section { margin: 6px 0 2px; border-top: 1px solid var(--border); padding-top: 6px; }
  .best-hours-label { font-size: 10px; color: var(--white); font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
  .best-hours-pills { display: flex; gap: 3px; flex-wrap: wrap; }
  .best-hour-pill { font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 8px; background: rgba(26,32,48,0.8); border: 1px solid var(--border); color: var(--muted); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.5px; }
  .best-hour-pill.active { background: rgba(0,230,118,0.12); color: var(--green); border-color: rgba(0,230,118,0.45); }
  .sess-in  { font-size: 10px; font-weight: 700; color: var(--green); }
  .sess-out { font-size: 10px; font-weight: 700; color: var(--red); }

  /* ── API STATUS PANEL ── */
  .api-panel { background: var(--card); border: 1px solid rgba(0,200,255,0.25); border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; }
  .api-panel-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; color: var(--blue); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .api-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 11px; }
  .api-row:last-child { border-bottom: none; }

  /* ── PER-CARD API STRIP ── */
  .card-api-strip { background: rgba(0,200,255,0.04); border: 1px solid rgba(0,200,255,0.22); border-radius: 6px; padding: 8px 10px; margin-bottom: 8px; transition: border-color 0.2s, opacity 0.2s; }
  .card-api-strip.disabled { border-color: rgba(74,98,114,0.2); opacity: 0.65; }
  .card-api-strip.enabled  { border-color: rgba(0,230,118,0.35); }
  .card-api-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .api-row-label { color: #ffffff; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; }
  .api-row-val { font-family: 'JetBrains Mono', monospace; font-size: 10px; max-width: 55%; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .conn-ok    { color: var(--green); }
  .conn-err   { color: var(--red); }
  .conn-check { color: var(--yellow); }
  .closeall-btn { background: rgba(255,61,61,0.14); border: 1px solid rgba(255,61,61,0.4); color: var(--red); padding: 3px 10px; border-radius: 3px; font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 1px; cursor: pointer; }
  .closeall-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── API ENABLE TOGGLE ── */
  .api-toggle-wrap { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
  .api-toggle-wrap input[type=checkbox] { position: absolute; opacity: 0; width: 0; height: 0; }
  .api-toggle-track { position: relative; width: 52px; height: 28px; background: #2a3f52; border: 2px solid #6a99bb; border-radius: 14px; transition: background 0.2s, border-color 0.2s; flex-shrink: 0; box-shadow: 0 0 6px rgba(106,153,187,0.35); }
  .api-toggle-thumb { position: absolute; top: 4px; left: 4px; width: 16px; height: 16px; background: #c8dff0; border-radius: 50%; transition: transform 0.2s, background 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.5); }
  .api-toggle-wrap input:checked ~ .api-toggle-track { background: rgba(0,230,118,0.22); border-color: var(--green); box-shadow: 0 0 8px rgba(0,230,118,0.4); }
  .api-toggle-wrap input:checked ~ .api-toggle-track .api-toggle-thumb { transform: translateX(24px); background: var(--green); }
  .api-toggle-label { font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 1.5px; color: #ffffff; font-weight: 700; transition: color 0.2s; }
  .api-toggle-wrap input:checked ~ .api-toggle-label { color: var(--green); }
  .api-panel.disabled { border-color: rgba(74,98,114,0.2); opacity: 0.6; }
  .api-panel.disabled .api-panel-title { color: var(--muted); }

  /* ── COMBINED BAR ── */
  .combined { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 12px; }
  .cpill { background: var(--card); border: 1px solid var(--border); border-radius: 5px; padding: 10px 8px; text-align: center; }
  .cpill-label { font-size: 9px; color: #ffffff; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; font-weight: 700; }
  .cpill-value { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 1px; }

  /* ── TICKER CARD ── */
  .ticker-card { background: #000; border: 2px solid #222; border-radius: 10px; margin-bottom: 12px; overflow: hidden; transition: border-color 0.3s; }
  .ticker-card.border-wait   { border-color: #ff3d3d; }
  .ticker-card.border-armed  { border-color: #ffd740; }
  .ticker-card.border-same   { border-color: #00e676; }
  .ticker-card.border-new    { border-color: #00c8ff; }

  .bp-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px 10px; border-bottom: 1px dashed #222; }
  .bp-token { font-family: 'Bebas Neue', sans-serif; font-size: 72px; letter-spacing: 3px; color: #fff; line-height: 1; }
  .bp-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .badge { font-family: 'Bebas Neue', sans-serif; font-size: 13px; padding: 3px 10px; border-radius: 3px; letter-spacing: 1.5px; }
  .badge-green  { background: #00e676; color: #000; }
  .badge-yellow { background: #ffd740; color: #000; }
  .badge-red    { background: #ff3d3d; color: #fff; }
  .badge-flat   { background: #222; color: #4a6272; border: 1px solid #333; }
  .badge-osc    { background: #00e676; color: #000; animation: pulse 1.5s ease-in-out infinite; }

  .bp-grid { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px dashed #222; }
  .bp-cell { padding: 10px 14px; border-right: 1px dashed #222; }
  .bp-cell:nth-child(even) { border-right: none; }
  .bp-cell-label { font-size: 14px; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 3px; }
  .bp-cell-value { font-family: 'Bebas Neue', sans-serif; font-size: 56px; letter-spacing: 1px; line-height: 1; color: #fff; }
  .bp-cell-value.green  { color: #00e676; }
  .bp-cell-value.yellow { color: #ffd740; }
  .bp-cell-value.red    { color: #ff3d3d; }
  .bp-cell-value.blue   { color: #00c8ff; }

  .bp-action { padding: 10px 14px; border-bottom: 1px dashed #222; display: flex; justify-content: space-between; align-items: center; }
  .bp-action-label { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; color: #ffffff; font-weight: 700; }
  .bp-action-detail { text-align: right; font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 1px; line-height: 1.4; }

  .bp-orders { padding: 10px 14px; border-bottom: 1px dashed #222; }
  .bp-order-row { display: flex; justify-content: space-between; font-size: 11px; padding: 3px 0; }
  .bp-order-label { color: #ffffff; font-weight: 700; }
  .bp-order-val { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; }

  .bp-tick-strip { display: flex; align-items: center; gap: 6px; padding: 10px 14px; }
  .tick-dot { width: 10px; height: 10px; border-radius: 50%; background: #222; border: 1px solid #333; }
  .tick-dot.filled { background: #ffd740; border-color: #ffd740; }
  .tick-dot.confirmed { background: #00e676; border-color: #00e676; }
  .tick-count-label { font-size: 10px; color: #4a6272; margin-left: 4px; }

  .pt-strip { display: flex; gap: 5px; padding: 10px 14px; align-items: center; }
  .pt-slot { width: 50px; height: 54px; border: 1px solid #222; border-radius: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; background: #050a0f; }
  .pt-slot.active { border-color: #ffd740; background: rgba(255,215,64,0.05); animation: pulse 1s infinite; }
  .pt-slot.confirmed { border-color: #00e676; background: rgba(0,230,118,0.06); }
  .pt-label { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: #4a6272; }
  .pt-price { font-size: 9px; color: #4a6272; }
  .pt-tick  { font-size: 9px; color: #4a6272; }

  .bp-footer { padding: 8px 14px; display: flex; justify-content: space-between; align-items: center; background: #050a0e; }
  .bp-pnl { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 1px; }
  .candle-cd { font-size: 10px; color: var(--cyan); font-weight: 700; margin-top: 2px; }

  /* ── SIM BANNER ── */
  .sim-banner { display: none; background: rgba(0,230,118,0.06); border: 1px solid rgba(0,230,118,0.2); border-radius: 5px; padding: 8px 12px; margin-bottom: 10px; font-size: 10px; color: var(--green); font-weight: 700; justify-content: space-between; }
  .sim-banner.complete { background: rgba(255,215,64,0.06); border-color: rgba(255,215,64,0.25); color: var(--yellow); }

  /* ── DOWNLOAD MODAL ── */
  .dl-modal-overlay { display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.88); align-items:center; justify-content:center; }
  .dl-modal-overlay.open { display:flex; }
  .dl-modal { background:#080f08; border:1px solid rgba(0,230,118,0.35); border-radius:10px; padding:28px 28px 20px; width:92%; max-width:360px; text-align:center; }
  .dl-modal-title { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:3px; color:#00e676; margin-bottom:4px; }
  .dl-modal-sub { font-size:10px; color:#4a6272; margin-bottom:18px; line-height:1.8; }
  .dl-btn { display:block; width:100%; padding:9px 12px; margin-bottom:8px; border-radius:5px; font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:1.5px; cursor:pointer; border:1px solid rgba(0,200,255,0.3); background:rgba(0,200,255,0.1); color:#00c8ff; }
  .dl-btn.trade { border-color:rgba(0,230,118,0.35); background:rgba(0,230,118,0.08); color:#00e676; }
  .dl-dismiss { margin-top:12px; background:none; border:1px solid #1a2a1a; color:#4a6272; border-radius:4px; padding:6px 20px; font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:1px; cursor:pointer; }

  /* ── DIAG LOG ── */
  .diag-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; }
  .diag-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .diag-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; color: #ffffff; font-weight: 700; }
  .diag-subtitle { font-size: 9px; color: var(--muted); margin-top: 1px; }
  .diag-ts { font-size: 9px; color: var(--muted); }
  .diag-controls { display: flex; gap: 6px; align-items: center; }
  .diag-btn { background: rgba(0,200,255,0.1); border: 1px solid rgba(0,200,255,0.2); color: var(--blue); padding: 3px 8px; border-radius: 3px; font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 1px; cursor: pointer; }
  .diag-btn.active { background: rgba(255,61,61,0.12); border-color: rgba(255,61,61,0.25); color: var(--red); }
  .diag-log { height: 280px; overflow-y: auto; border: 1px solid var(--border); border-radius: 4px; padding: 6px; background: #02060a; }
  .dline { display: flex; gap: 8px; padding: 2px 0; border-bottom: 1px solid #080e14; font-size: 10px; align-items: baseline; }
  .dstep  { color: #1a3a4a; min-width: 60px; flex-shrink: 0; }
  .dlabel { color: var(--muted); min-width: 130px; flex-shrink: 0; }
  .dval   { flex: 1; }
  .dval.ok     { color: var(--green); }
  .dval.bad    { color: var(--red); }
  .dval.warn   { color: var(--yellow); }
  .dval.info   { color: var(--blue); }
  .dval.muted  { color: #2a4a5a; }
  .dval.purple { color: var(--purple); }
  .diag-ts { color: #1a3a4a; font-size: 9px; min-width: 40px; text-align: right; }

  /* ── TRADE LOG ── */
  .trade-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 11px; cursor: pointer; }
  .trade-row:hover { background: rgba(255,255,255,0.02); }
  .trade-row.win  { border-left: 3px solid var(--green); }
  .trade-row.loss { border-left: 3px solid var(--red); }
  .detail-back { padding: 10px; font-size: 11px; color: var(--blue); cursor: pointer; }
  #detailView { display: none; padding: 10px; }
  #detailView.open { display: block; }
  .fill-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 11px; }
  .fill-badge { padding: 2px 8px; border-radius: 3px; font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 1px; }
  .fill-ok   { background: rgba(0,230,118,0.15); color: var(--green); }
  .fill-warn { background: rgba(255,215,64,0.15); color: var(--yellow); }
  .fill-bad  { background: rgba(255,61,61,0.15); color: var(--red); }
</style>
</head>
<body>

<div class="tab-bar">
  <div class="tab active" onclick="switchTab('dashboard')">Dashboard</div>
  <div class="tab" onclick="switchTab('trades')">Trade Log</div>
  <div class="tab" onclick="switchTab('diag')">Diagnostics</div>
</div>

<!-- DASHBOARD -->
<div class="tab-content active" id="tab-dashboard">
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-title">FIL<span>.</span>API<span>.</span>MEXC</div>
      <button class="clear-btn" onclick="clearAll()">CLEAR</button>
    </div>
    <div class="hdr-right">
      <div class="hdr-clock"><span class="live-dot"></span><span id="clock">--:--:-- EDT</span></div>
      <div class="hdr-session" id="sessionLabel">--</div>
    </div>
  </div>

  <div class="session-bar" id="sessionBar"></div>
  <div class="sim-banner" id="simBanner" style="display:none"></div>

  <!-- DOWNLOAD MODAL -->
  <div class="dl-modal-overlay" id="downloadModal">
    <div class="dl-modal">
      <div class="dl-modal-title">SESSION COMPLETE</div>
      <div class="dl-modal-sub">Auto-stopped 09:00 EDT</div>
      <button class="dl-btn" onclick="exportDiagCSV()">↓ FIL Diagnostic Log</button>
      <button class="dl-btn trade" onclick="exportTradeCSV()">↓ Session Trade Log</button>
      <button class="dl-dismiss" onclick="document.getElementById('downloadModal').classList.remove('open')">DISMISS</button>
    </div>
  </div>

  <!-- COMBINED STATS -->
  <div class="combined">
    <div class="cpill"><div class="cpill-label">P&L (paper)</div><div class="cpill-value" id="totalPnl">+$0</div></div>
    <div class="cpill"><div class="cpill-label">Win Rate</div><div class="cpill-value" id="totalWr">--</div></div>
    <div class="cpill"><div class="cpill-label">Trades</div><div class="cpill-value" id="totalTrades">0</div></div>
    <div class="cpill"><div class="cpill-label">Bands</div><div class="cpill-value" id="totalOsc">0</div></div>
  </div>

  <div id="tickerCards"></div>
</div>

<!-- TRADE LOG -->
<div class="tab-content" id="tab-trades">
  <div style="padding:4px 0 10px;display:flex;justify-content:space-between;align-items:center">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--white)">TRADE LOG</div>
    <div style="font-size:10px;color:var(--muted)" id="logSummary">--</div>
  </div>
  <div id="fullTradeLog"><div style="color:var(--muted);padding:20px;text-align:center">No trades yet</div></div>
</div>

<!-- DIAGNOSTICS -->
<div class="tab-content" id="tab-diag">
  <div id="diagCards"></div>
</div>

<!-- TRADE DETAIL -->
<div id="detailView">
  <div class="detail-back" onclick="closeDetail()">← Back</div>
  <div id="detailContent"></div>
</div>

<script>
window.onerror = function(msg, src, line) {
  const d = document.getElementById('tickerCards');
  if (d) d.innerHTML = '<div style="padding:20px;background:#1a0000;border:1px solid #ff3d3d;border-radius:6px;font-size:11px;color:#ff3d3d"><b>JS ERROR:</b><br>' + msg + '<br>Line: ' + line + '</div>';
  return false;
};

// ── CONFIG ────────────────────────────────────────────────────────────────────
const TOKEN_CONFIG = {
  FILUSDT: {
    margin: 1000, leverage: 50, notional: 50000, contractSize: 1,
    bestHours: [13,14,15,16,17,18,19,20], label: 'FIL', tick: 0.001,
    longOnly: true,
  },
  ATOMUSDT: {
    margin: 1000, leverage: 50, notional: 50000, contractSize: 1,
    bestHours: [13,14,15,16,17,18,19,20], label: 'ATOM', tick: 0.001,
    longOnly: true,
  },
};
const SYMBOLS   = ['FILUSDT', 'ATOMUSDT'];
const MEXC_SYM  = { FILUSDT: 'FILECOIN_USDT', ATOMUSDT: 'ATOM_USDT' };

// ── API EXECUTION CONFIG ──────────────────────────────────────────────────────
// API_LOTS: contracts per trade.  1 contract = 1 token on MEXC futures.
// FIL ~$1.00 × 100 lots × 50x = $100 notional = $2 margin (safe for demo).
// ATOM ~$4.50 × 100 lots × 50x = $450 notional = $9 margin (safe for demo).
// Increase after confirming API connectivity on demo.
const API_LOTS      = 100;
const API_LEVERAGE  = 50;

// ── API ENABLE FLAG ───────────────────────────────────────────────────────────
// Per-symbol. Starts OFF — paper simulation runs regardless.
// Toggle per-card ON to send live orders for that pair only.
const apiEnabled = {};
SYMBOLS.forEach(s => { apiEnabled[s] = false; });

// ── TRADING CONSTANTS ─────────────────────────────────────────────────────────
const TAKER_FEE      = 0.0002;
const MAKER_FEE      = 0;
const EARLY_EXIT_PCT = 0.25;
const SESSION_END_H  = 9;
const POLL_DETECT    = 20000;
const POLL_ARMED     =  5000;
const POLL_FILLED    = 10000;
const CANDLE_INT     = 'Min1';
const ZONE_TOLERANCE = 1;
const ZONE_WINDOW_N  = 4;
const ZONE_WINDOW_K  = 4;
const ZONE_MIN_EACH  = 1;
const BAND_HOLD_HOURS = 4;
const CONFIRM_COUNT  = 3;

// ── DIAG LOG ──────────────────────────────────────────────────────────────────
const DIAG_KEY   = 'fil_api_diag_v1';
const diagLogs   = { FILUSDT: [], ATOMUSDT: [] };
let diagEnabled  = true;
let sessionStartTs  = null;
let sessionRunning  = false;
let pollerStopped   = false;
let sessionStartEdtH = 0;
let allTrades       = [];

function dp(sym, step, label, val, cls) {
  if (!diagEnabled) return;
  diagLogs[sym].push({ step, label, val, cls: cls || 'info', ts: fmtTime(Date.now()), wall: new Date().toISOString() });
  try { localStorage.setItem(DIAG_KEY, JSON.stringify(diagLogs[sym].slice(-500))); } catch(e) {}
}

  const log = diagLogs['FILUSDT'] || [];

// ── TIME ──────────────────────────────────────────────────────────────────────
function edtHour() {
  const h = parseInt(new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',hour:'numeric',hour12:false}).format(new Date()),10);
  return h === 24 ? 0 : h;
}
function edtSecond() {
  return parseInt(new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',second:'numeric'}).format(new Date()),10);
}
function nyTzName() {
  const s = new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',timeZoneName:'short'}).format(new Date());
  return (s.match(/\b(E[DS]T)\b/)||['','EDT'])[1];
}
function fmtTime(ms) {
  return new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(ms));
}
function fmtPrice(v, tick) {
  if (!v && v !== 0) return '—';
  const dec = tick < 0.001 ? 4 : tick < 0.01 ? 3 : tick < 0.1 ? 2 : 1;
  return v.toFixed(dec);
}
function fmtPnl(v) {
  if (v === null || v === undefined) return '—';
  return (v >= 0 ? '+' : '') + '$' + Math.abs(v).toFixed(2);
}
function roundTick(v, tick) { return Math.round(v / tick) * tick; }
function sessionName(h) {
  if (h>=0&&h<3)  return 'Asia Session';
  if (h>=3&&h<9)  return 'London Session';
  if (h>=9&&h<11) return 'NY Open (Blackout)';
  if (h>=11&&h<21)return 'NY Session';
  return 'Late Session';
}

// ── STATE ─────────────────────────────────────────────────────────────────────
function todayStartEDT() {
  const now = new Date();
  const parts = new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).formatToParts(now);
  const get = t => +parts.find(p=>p.type===t).value;
  const elapsedMs = ((get('hour')*60+get('minute'))*60+get('second'))*1000+now.getMilliseconds();
  return now.getTime()-elapsedMs;
}

// ── BLACKOUT ──────────────────────────────────────────────────────────────────
// Single concept: each symbol's bestHours array is the sole session gate.
// inBlackoutSym(sym) drives both poll skips and the per-card UI.
function inBlackoutSym(sym) { return !TOKEN_CONFIG[sym].bestHours.includes(edtHour()); }

// ── API CALLS (fire-and-forget with logging) ───────────────────────────────────
// All API calls are non-blocking: they post to the server, log success/failure
// in the diag log, and never halt the main poll loop on failure.

function setApiStatus(sym, field, value, cls) {
  const el = document.getElementById('api_'+sym+'_'+field);
  if (el) { el.textContent = value; el.className = 'api-row-val ' + (cls || ''); }
  const last = document.getElementById('api_'+sym+'_LastEvent');
  if (last && field !== 'LastEvent') last.textContent = field + ': ' + value;
}

async function apiOpenLong(sym) {
  if (!apiEnabled[sym]) { dp(sym, pollCount+'.API', 'API SKIP', 'toggle off — paper only', 'muted'); return; }
  const st = state[sym];
  const price = st.oscLower;
  const qty   = API_LOTS;
  dp(sym, pollCount+'.API', 'API OPEN LONG', 'POST /api/fil/order/open price='+fmtPrice(price,st.tick)+' vol='+qty, 'info');
  try {
    const r = await fetch('/api/fil/order/open', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ price, vol: qty, leverage: API_LEVERAGE }),
    });
    const data = await r.json();
    if (data.code === 200 && data.data) {
      st.apiEntryOrderId = data.data;
      dp(sym, pollCount+'.API', 'API ENTRY ORDER PLACED', 'orderId='+data.data, 'ok');
      setApiStatus(sym, 'EntryId', data.data, 'conn-ok');
    } else {
      dp(sym, pollCount+'.API', 'API ENTRY ORDER FAILED', JSON.stringify(data), 'bad');
      setApiStatus(sym, 'EntryId', 'FAILED: '+(data.message||data.msg||JSON.stringify(data)), 'conn-err');
    }
  } catch(e) {
    dp(sym, pollCount+'.API', 'API ENTRY ORDER ERROR', e.message, 'bad');
    setApiStatus(sym, 'EntryId', 'ERR: '+e.message, 'conn-err');
  }
}

    dp(sym, pollCount+'.API', 'API TP ORDER ERROR', e.message, 'bad');

      dp(sym, pollCount+'.API', 'API SL PLAN ORDER PLACED', 'orderId='+data2.data, 'ok');

// ── TOGGLE API ON / OFF — per symbol ─────────────────────────────────────────
function toggleApi(sym) {
  apiEnabled[sym] = document.getElementById('apiToggle_'+sym).checked;
  const strip    = document.getElementById('card_api_'+sym);
  const label    = document.getElementById('apiToggleLabel_'+sym);
  const closeBtn = document.getElementById('closeAllBtn_'+sym);
  const cfg      = TOKEN_CONFIG[sym];

  if (apiEnabled[sym]) {
    strip.classList.remove('disabled');
    strip.classList.add('enabled');
    label.textContent = cfg.label + ' API ON · LIVE ORDERS';
    closeBtn.disabled = false;
    dp(sym, 'API.TOG', 'API ENABLED', 'live order execution active · running health check', 'ok');
    apiHealthCheck(sym);
  } else {
    strip.classList.remove('enabled');
    strip.classList.add('disabled');
    label.textContent = cfg.label + ' API OFF · PAPER ONLY';
    closeBtn.disabled = true;
    dp(sym, 'API.TOG', 'API DISABLED', 'reverted to paper mode · cancelling open orders', 'warn');
    apiCancelAll(sym);
    ['EntryId','TpId','SlId'].forEach(f => setApiStatus(sym, f, '—', ''));
    const lastEl = document.getElementById('api_'+sym+'_LastEvent');
    if (lastEl) lastEl.textContent = 'API disabled';
    const conn = document.getElementById('apiConn_'+sym);
    if (conn) { conn.textContent = 'DISABLED'; conn.className = 'api-row-val'; }
  }
}

// ── CANDLE FETCH ──────────────────────────────────────────────────────────────
function parseCandles(raw) {
  if (!raw || !raw.data) return [];
  const d = raw.data;
  const ts=d.time||[], o=d.open||[], h=d.high||[], l=d.low||[], c=d.close||[];
  return ts.map((t,i) => ({
    ts:    t*1000, open: parseFloat(o[i]), high: parseFloat(h[i]),
    low:   parseFloat(l[i]), close: parseFloat(c[i]),
  })).filter(c => !isNaN(c.close));
}

async function fetchCandles(symbol, limit) {
  try {
    const msym = MEXC_SYM[symbol] || symbol;
    const r = await fetch('/proxy/mexc/kline?symbol='+msym+'&interval='+CANDLE_INT+'&limit='+limit);
    if (!r.ok) return [];
    const raw = await r.json();
    if (raw.blackout) {
      dp(symbol, pollCount+'.SRV', 'SERVER BLACKOUT', raw.message, 'warn');
      return [];
    }
    return parseCandles(raw);
  } catch(e) { return []; }
}

function mergeCandles(stored, fresh) {
  const map = new Map();
  stored.forEach(c => map.set(c.ts, c));
  fresh.forEach(c => map.set(c.ts, c));
  return Array.from(map.values()).sort((a,b) => a.ts-b.ts).slice(-30);
}

function inferTick(candles) {
  const c = candles.slice(-20);
  const diffs = [];
  for (let i=1;i<c.length;i++) {
    const d = Math.abs(c[i].close-c[i-1].close);
    if (d>0) diffs.push(+d.toFixed(7));
  }
  if (!diffs.length) return 0.001;
  diffs.sort((a,b)=>a-b);
  return diffs[Math.max(0,Math.floor(diffs.length*0.05))];
}

// ── P&L ───────────────────────────────────────────────────────────────────────
function calcPnl(sym, entry, exit, direction, reason) {
  const cfg   = TOKEN_CONFIG[sym];
  const gross = cfg.notional * (exit - entry) / entry;
  const fees  = (['TP','EARLY_LIMIT','BREAKEVEN'].includes(reason) ? MAKER_FEE : TAKER_FEE) * cfg.notional;
  const entryFee = MAKER_FEE * cfg.notional;
  return { gross: +gross.toFixed(2), fees: +(fees+entryFee).toFixed(2), net: +(gross-fees-entryFee).toFixed(2) };
}

// ── TRADE BUILDERS ────────────────────────────────────────────────────────────
function buildTrade(sym, entry, target, sl, detectionPrice, candle) {
  const st = state[sym];
  return {
    id: Date.now()+'_'+sym+'_LONG', sym, direction: 'LONG',
    entry, target, sl, detectionPrice,
    bandLower: st.oscLower, bandUpper: st.oscUpper,
    bandTicks: Math.round((st.oscUpper-st.oscLower)/st.tick),
    notional: TOKEN_CONFIG[sym].notional, leverage: TOKEN_CONFIG[sym].leverage,
    margin: TOKEN_CONFIG[sym].margin,
    ts: Date.now(), timeOpen: fmtTime(Date.now()),
    exit: null, exitReason: null, tsClose: null, timeClose: null,
    gross: null, fees: null, net: null, outcome: null, holdMinutes: null,
    fillConfirmed: false, openedAtCandleTs: candle ? candle.ts : null,
    filledAtCandleTs: null, fillPrice: null, fillTime: null,
  };
}

function openLong(sym, candle) {
  const st = state[sym];
  const t  = buildTrade(sym, st.oscLower, st.oscUpper, st.oscLower-2*st.tick, candle?candle.close:st.lastPrice, candle);
  st.openLong  = t;
  st.activeDir = 'LONG';
  dp(sym, pollCount+'.ARM', 'LONG ARMED', 'E:'+fmtPrice(t.entry,st.tick)+' TP:'+fmtPrice(t.target,st.tick)+' SL:'+fmtPrice(t.sl,st.tick), 'ok');
  // ── API: place limit buy entry order ──
  apiOpenLong(sym);
}

function closeTrade(sym, trade, exitPrice, reason) {
  const st  = state[sym];
  const pnl = calcPnl(sym, trade.entry, exitPrice, 'LONG', reason);
  trade.exit = exitPrice; trade.exitReason = reason;
  trade.tsClose = Date.now(); trade.timeClose = fmtTime(Date.now());
  trade.gross = pnl.gross; trade.fees = pnl.fees; trade.net = pnl.net;
  trade.outcome = pnl.net > 0 ? 'WIN' : 'LOSS';
  trade.holdMinutes = Math.round((trade.tsClose-trade.ts)/60000);
  st.trades.push(trade); allTrades.push(trade);
  localStorage.setItem('fil_api_trades_v1', JSON.stringify(st.trades));
  if (st.openLong === trade) st.openLong = null;
}

function resetBand(sym, reason) {
  const st = state[sym];
  dp(sym, pollCount+'.RST', 'BAND RESET', reason, 'bad');
  if (st.openLong && !st.openLong.fillConfirmed) st.openLong = null;
  st.inOsc = false; st.oscLower = 0; st.oscUpper = 0;
  st.zwAnchorLow = null; st.zwAnchorHigh = null;
  st.zwBuffer = []; st.zwLowCount = 0; st.zwHighCount = 0; st.zwLastTs = 0;
  st.zwHeldTs = null; st.zwLastReset = null; st.cycleTradeCount = 0;
  st.activeDir = 'LONG'; st.action = 'WAIT';
  st.inDrift = false; st.shadowBuffer = []; st.shadowCount = 0;
  st.shadowPrice1 = null; st.shadowPrice2 = null; st.unrPnl = 0;
  // ── API: cancel any open orders on reset ──
  apiCancelAll(sym);
}

// ── ZONE-WINDOW DETECTION ─────────────────────────────────────────────────────
function updateZoneWindow(sym, candle) {
  const st   = state[sym];
  const tick = st.tick;
  const close = roundTick(candle.close, tick);
  const now   = candle.ts;
  if (now - st.zwLastTs < 15000) return null;
  st.zwLastTs = now;

  if (st.zwAnchorLow === null) {
    st.zwAnchorLow = close; st.zwAnchorHigh = null;
    st.zwBuffer = ['L']; st.zwLowCount = 1; st.zwHighCount = 0;
    return null;
  }

  const span  = (st.zwAnchorHigh !== null) ? (st.zwAnchorHigh - st.zwAnchorLow) : 0;
  const tol   = ZONE_TOLERANCE * tick;
  const isL   = Math.abs(close - st.zwAnchorLow)  <= tol;
  const isH   = st.zwAnchorHigh !== null && Math.abs(close - st.zwAnchorHigh) <= tol;

  if (!isL && !isH) {
    if (st.zwAnchorHigh === null && close > st.zwAnchorLow + tol && close <= st.zwAnchorLow + tick + tol) {
      st.zwAnchorHigh = close;
      st.zwBuffer.push('H'); if (st.zwBuffer.length > ZONE_WINDOW_N) st.zwBuffer.shift();
      st.zwHighCount++;
      if (st.zwBuffer.length >= ZONE_WINDOW_N && st.zwLowCount >= ZONE_MIN_EACH && st.zwHighCount >= ZONE_MIN_EACH) {
        return { confirmed: true, lower: st.zwAnchorLow, upper: st.zwAnchorHigh };
      }
      return null;
    }
    st.zwAnchorLow = close; st.zwAnchorHigh = null;
    st.zwBuffer = ['L']; st.zwLowCount = 1; st.zwHighCount = 0;
    return null;
  }

  const label = isL ? 'L' : 'H';
  st.zwBuffer.push(label);
  if (st.zwBuffer.length > ZONE_WINDOW_N) st.zwBuffer.shift();
  if (isL) st.zwLowCount++; else st.zwHighCount++;

  if (st.zwBuffer.length >= ZONE_WINDOW_N && st.zwLowCount >= ZONE_MIN_EACH && st.zwHighCount >= ZONE_MIN_EACH) {
    const lower = st.zwAnchorLow;
    const upper = st.zwAnchorHigh !== null ? st.zwAnchorHigh : st.zwAnchorLow + tick;
    return { confirmed: true, lower, upper };
  }
  return null;
}

// ── PROCESS SYMBOL ────────────────────────────────────────────────────────────
async function processSym(sym) {
  pollCount++;
  const p  = pollCount;
  const st = state[sym];

  // Always fetch candles first so the card renders with a live price and day range,
  // even during off-hours. The blackout check below only gates detection/trading.
  const limit = st.candles.length >= 25 ? 4 : 25;
  dp(sym, p+'.1', 'POLL START', 'fetching '+limit+' candles', 'muted');

  const fresh = await fetchCandles(sym, limit);
  if (!fresh.length) { dp(sym, p+'.2', 'FETCH', 'NO DATA — skip', 'bad'); return; }

  const raw  = limit === 4 ? mergeCandles(st.candles, fresh) : fresh;
  st.candles = raw;
  st.tick    = TOKEN_CONFIG[sym].tick || inferTick(raw);
  const last = raw[raw.length-1];
  st.lastPrice = last.close;
  const dayHigh = Math.max(...raw.map(c=>c.high));
  const dayLow  = Math.min(...raw.map(c=>c.low));
  st.dayRange   = (dayHigh-dayLow)/dayLow*100;

  // Per-symbol blackout skip — only gates detection/trading, not price display
  if (inBlackoutSym(sym) && !st.zwHeldTs && !st.openLong) {
    dp(sym, p+'.1', 'BLACKOUT SKIP', 'outside best hours ['+TOKEN_CONFIG[sym].bestHours.map(h=>String(h).padStart(2,'0')+':00').join(' ')+' EDT]', 'muted');
    renderTicker(sym);
    return;
  }

  dp(sym, p+'.2', 'CANDLES', raw.length+' in window · fetched '+fresh.length, 'ok');
  dp(sym, p+'.3', 'LAST CLOSE', fmtPrice(last.close,st.tick), 'info');
  dp(sym, p+'.5', 'inOsc / dir', (st.inOsc?'true':'false')+' / '+st.activeDir, st.inOsc?'ok':'muted');

  const isNewCandle = last.ts !== st.lastCandleTs;
  if (isNewCandle) { st.lastCandleTs = last.ts; st.displayPrice = last.close; }
  dp(sym, p+'.8', 'CANDLE', isNewCandle ? 'NEW' : 'LIVE', isNewCandle?'ok':'muted');

  // ── SECTION A: ZONE-WINDOW DETECTION ─────────────────────────────────────
  if (!st.inOsc) {

    // Held band check
    if (st.zwHeldTs) {
      const heldMs  = Date.now()-st.zwHeldTs;
      const heldHrs = heldMs/3600000;
      const livePrice = roundTick(last.close, st.tick);
      const stillInZone = livePrice===st.oscLower || livePrice===st.oscUpper;
      if (!stillInZone) {
        dp(sym, p+'.9', 'BAND EXPIRED', 'price broke out of held zone → reset', 'bad');
        resetBand(sym, 'held band expired — price broke out of zone');
        if (inBlackoutSym(sym)) dp(sym, p+'.9b', 'BLACKOUT SKIP', 'post-reset — outside session', 'muted');
        return;
      }
      if (heldHrs >= BAND_HOLD_HOURS) {
        dp(sym, p+'.9', 'BAND EXPIRED', 'held '+heldHrs.toFixed(1)+'h >= '+BAND_HOLD_HOURS+'h max', 'bad');
        resetBand(sym, 'held band expired — max hold time exceeded');
        if (inBlackoutSym(sym)) dp(sym, p+'.9b', 'BLACKOUT SKIP', 'post-reset — outside session', 'muted');
        return;
      }
      if (!inBlackoutSym(sym)) {
        dp(sym, p+'.9', 'BAND ARMING', 'held band cleared blackout → arm LONG', 'ok');
        st.zwHeldTs = null; st.inOsc = true;
        openLong(sym, last);
        return;
      }
      dp(sym, p+'.9', 'BAND HELD', 'held '+heldHrs.toFixed(1)+'h/'+BAND_HOLD_HOURS+'h', 'warn');
      st.action = 'WAIT'; return;
    }

    if (isNewCandle) st.zwLastTs = 0;
    const result = updateZoneWindow(sym, last);
    const buf    = st.zwBuffer;
    const bStr   = buf.length ? '['+buf.join('')+'] L='+st.zwLowCount+' H='+st.zwHighCount+'/'+ZONE_WINDOW_K : 'empty';
    dp(sym, p+'.9', 'ZW PROGRESS',
      (st.zwAnchorLow?'L='+fmtPrice(st.zwAnchorLow,st.tick):'no anchor')+
      (st.zwAnchorHigh?' H='+fmtPrice(st.zwAnchorHigh,st.tick):'')+' · '+bStr,
      buf.length>=ZONE_WINDOW_K?'warn':'muted');

    if (result && result.confirmed) {
      st.oscLower = result.lower; st.oscUpper = result.upper;
      st.bandConfirmCount++;
      dp(sym, p+'.10', 'BAND CONFIRMED', 'zone '+fmtPrice(st.oscLower,st.tick)+' – '+fmtPrice(st.oscUpper,st.tick)+' #'+st.bandConfirmCount, 'ok');

      if (!inBlackoutSym(sym)) {
        st.inOsc = true; st.zwHeldTs = null; st.action = 'ARMED';
        openLong(sym, last);
      } else {
        st.zwHeldTs = Date.now(); st.action = 'WAIT';
        dp(sym, p+'.11', 'BLACKOUT HOLD', 'arming blocked · holding up to '+BAND_HOLD_HOURS+'h', 'warn');
      }
    } else {
      dp(sym, p+'.10', 'WAITING FOR BAND', 'K-of-N · N='+ZONE_WINDOW_N+' K='+ZONE_WINDOW_K+' · buf='+buf.length, 'muted');
      st.action = 'WAIT';
    }
    return;
  }

  // ── SECTION B: LONG LEG (long-only mode) ─────────────────────────────────
  if (st.inOsc) {
    dp(sym, p+'.10', 'ACTIVE DIR', 'LONG', 'ok');

    if (!st.openLong) {
      if (!inBlackoutSym(sym)) openLong(sym, last);
      return;
    }

    const lng = st.openLong;

    // Fill detection
    if (!lng.fillConfirmed) {
      const fillCandles = raw.filter(c => c.ts >= lng.openedAtCandleTs);
      const fillLow = fillCandles.length ? Math.min(...fillCandles.map(c=>c.low)) : Infinity;
      dp(sym, p+'.11', 'LONG FILL CHECK', 'fillLow='+fmtPrice(fillLow,st.tick)+' vs E='+fmtPrice(lng.entry,st.tick), fillLow<=lng.entry?'ok':'muted');

      if (fillLow < st.oscLower) {
        dp(sym, p+'.12', 'LONG SPIKE SWEEP', 'swept below band lower before fill — reset', 'bad');
        st.openLong = null;
        resetBand(sym, 'spike swept through long SL without clean fill');
        return;
      }
      if (fillLow <= lng.entry) {
        lng.fillConfirmed = true; lng.filledAtCandleTs = last.ts;
        lng.fillPrice = lng.entry; lng.fillTime = fmtTime(Date.now());
        dp(sym, p+'.12', 'LONG FILLED', 'confirmed @ '+fmtPrice(lng.entry,st.tick), 'ok');
        // ── API: cancel entry order (already filled on exchange), place TP+SL ──
        apiCancelEntry(sym);
        apiPlaceExits(sym);
      } else {
        const pendingCandles = raw.filter(c=>c.ts>lng.openedAtCandleTs).length;
        if (pendingCandles >= 3) {
          dp(sym, p+'.12', 'LONG TIMEOUT', 'no fill in 3 candles', 'bad');
          st.openLong = null;
          resetBand(sym, 'pending long expired — no fill in 3 candles');
          return;
        }
        dp(sym, p+'.12', 'LONG PENDING', 'waiting for price to drop to '+fmtPrice(lng.entry,st.tick)+' ('+pendingCandles+'/3c)', 'muted');
        st.action = 'ARMED'; return;
      }
    }

    // Position monitoring
    dp(sym, p+'.13', 'LONG IN TRADE', 'TP='+fmtPrice(lng.target,st.tick)+' SL='+fmtPrice(lng.sl,st.tick), 'ok');
    st.unrPnl = +(TOKEN_CONFIG[sym].notional*(last.close-lng.entry)/lng.entry).toFixed(2);
    dp(sym, p+'.13u', 'UNREALIZED PNL', fmtPnl(st.unrPnl)+' @ '+fmtPrice(last.close,st.tick), st.unrPnl>0?'ok':st.unrPnl<0?'warn':'muted');

    const isFirstPoll = last.ts === lng.filledAtCandleTs;

    // Early limit exit (25% of 2-tick SL)
    const slDollars = TOKEN_CONFIG[sym].notional * 2 * st.tick / lng.entry;
    const earlyThresh = slDollars * EARLY_EXIT_PCT;
    if (!isFirstPoll && st.unrPnl <= -earlyThresh) {
      const exitUnr = st.unrPnl; st.unrPnl = 0;
      dp(sym, p+'.14', 'LONG EARLY LIMIT', 'unrPnl='+fmtPnl(exitUnr)+' ≤ −'+fmtPnl(earlyThresh)+' (25% SL)', 'warn');
      closeTrade(sym, lng, last.close, 'EARLY_LIMIT');
      // ── API: cancel both TP and SL, then close at market ──
      apiCancelTp(sym); apiCancelSl(sym);
      resetBand(sym, 'long early limit exit — 25% SL threshold');
      return;
    }

    // TP hit → long-only: reset and wait for next band (no short)
    if (last.close > lng.entry) {
      const tpExit = Math.min(last.close, lng.target); st.unrPnl = 0;
      dp(sym, p+'.14', 'LONG TP HIT', fmtPrice(last.close,st.tick)+' > E='+fmtPrice(lng.entry,st.tick)+' → WIN · exit @ '+fmtPrice(tpExit,st.tick), 'ok');
      closeTrade(sym, lng, tpExit, 'TP');
      st.cycleTradeCount++;
      dp(sym, p+'.14b', 'LONG-ONLY TP', 'TP banked · resetting for next zone', 'ok');
      // ── API: cancel SL plan order (TP limit filled on exchange) ──
      apiCancelSl(sym);
      resetBand(sym, 'long-only: TP banked — waiting for new zone');
      return;
    }

    // Hard SL
    if (last.close <= lng.sl) {
      st.unrPnl = 0;
      dp(sym, p+'.14', 'LONG HARD SL', fmtPrice(last.close,st.tick)+' <= '+fmtPrice(lng.sl,st.tick)+' (E-2t) → LOSS', 'bad');
      closeTrade(sym, lng, lng.sl, 'SL');
      // ── API: cancel TP limit order (SL plan order filled on exchange) ──
      apiCancelTp(sym);
      resetBand(sym, 'long hard SL — 2 ticks adverse');
      return;
    }

    // Breakeven SL
    if (!isFirstPoll && last.close < lng.entry) {
      st.unrPnl = 0;
      dp(sym, p+'.14', 'LONG BREAKEVEN SL', fmtPrice(last.close,st.tick)+' < E → BREAKEVEN', 'warn');
      closeTrade(sym, lng, lng.entry, 'BREAKEVEN');
      // ── API: cancel both TP and SL ──
      apiCancelTp(sym); apiCancelSl(sym);
      resetBand(sym, 'long breakeven SL — price returned to entry');
      return;
    }

    dp(sym, p+'.14', 'LONG HOLDING', 'unrPnl='+fmtPnl(st.unrPnl)+' · awaiting close > '+fmtPrice(lng.entry,st.tick), isFirstPoll?'info':'warn');
    st.action = 'SAME_TRADE';
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderClock() {
  const t = new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(new Date());
  document.getElementById('clock').textContent = t + ' ' + nyTzName();
  document.getElementById('sessionLabel').textContent = sessionName(edtHour());
  // Update per-card candle countdown every second
  const secs = 60 - edtSecond();
  const cdText = 'next ' + (secs >= 60 ? 60 : secs) + 's';
  SYMBOLS.forEach(sym => {
    const cd = document.getElementById('candle-cd-'+sym);
    if (cd) cd.textContent = cdText;
  });
}

function renderSession() {
  // FIL-specific EDT session blocks — calibrated from 2026-05-27 diagnostic log (380 bands, 22hrs)
  // FIL PRIME  13–17 EDT: highest band density (17–24/hr), long-only primary window
  // EVENING EDGE 17–21 EDT: best fills-per-band in US hours (4.7–13.0/band) — log-confirmed active
  // NY OPEN RISK 09–11 EDT: dominant spike-sweep zone — blackout enforced
  // MID-DAY 11–13 EDT: low efficiency (2.8 fills/band), transition chop — observe only
  const sessions = [
    { l:'ASIA / OVERNIGHT', s:0,  e:9,  c:'#0d1e2a', cls:'', tip:'Off-hours — session auto-stops at 09:00 EDT' },
    { l:'NY OPEN RISK',     s:9,  e:11, c:'#2a0d0d', cls:'risk', tip:'High-vol spike zone — no trades (log: 40% spike-sweep failures)' },
    { l:'MID-DAY',          s:11, e:13, c:'#0d1520', cls:'', tip:'Low efficiency — 2.8 fills/band (log data), observe only' },
    { l:'FIL PRIME',        s:13, e:17, c:'#052a14', cls:'prime', tip:'Primary — 17–24 bands/hr · best on bullish FIL days' },
    { l:'EVENING EDGE',     s:17, e:21, c:'#031a2a', cls:'evening', tip:'Log-confirmed: 4.7–13.0 fills/band · cleaner oscillation post-US-close' },
    { l:'LATE NIGHT',       s:21, e:24, c:'#0d1620', cls:'', tip:'Off-hours' },
  ];
  const h = edtHour();
  document.getElementById('sessionBar').innerHTML = sessions.map(s => {
    const isCurrent = h >= s.s && h < s.e;
    const extraCls  = isCurrent ? (s.cls ? s.cls : 'now') : s.cls;
    const txtColor  = isCurrent ? '#ffffff' : 'var(--muted)';
    return '<div class="session-seg '+extraCls+'" style="background:'+s.c+';color:'+txtColor+';flex:'+(s.e-s.s)+'" title="'+s.tip+'">'+s.l+'</div>';
  }).join('');
}

function renderCombined() {
  const today = SYMBOLS.flatMap(s => state[s].trades.filter(t=>t.ts>=state[s].sessionStart));
  const net   = today.reduce((s,t)=>s+(t.net||0), 0);
  const wins  = today.filter(t=>t.outcome==='WIN').length;
  const count = today.length;
  const bands = SYMBOLS.reduce((s,sym)=>s+state[sym].bandConfirmCount, 0);
  const el    = document.getElementById('totalPnl');
  el.textContent = fmtPnl(net); el.style.color = net>=0?'var(--green)':'var(--red)';
  document.getElementById('totalWr').textContent     = count?Math.round(wins/count*100)+'%':'--';
  document.getElementById('totalTrades').textContent = count;
  document.getElementById('totalOsc').textContent    = bands;
}

function renderTicker(sym) {
  const st  = state[sym];
  const cfg = TOKEN_CONFIG[sym];
  if (!st.lastPrice) return;
  const card = document.getElementById('card_'+sym);
  if (!card) return;
  const lng = st.openLong;
  const act = st.action;

  let borderCls = 'border-wait';
  if (act === 'SAME_TRADE') borderCls = 'border-same';
  else if (act === 'ARMED') borderCls = 'border-armed';
  else if (st.zwBuffer && st.zwBuffer.length > 0) borderCls = 'border-new';
  card.className = 'ticker-card ' + borderCls;

  let badgeHtml = '';
  if (!st.inOsc) badgeHtml = '<span class="badge badge-flat">WATCHING</span>';
  else if (act==='ARMED') badgeHtml = '<span class="badge badge-yellow">LONG ARMED</span>';
  else if (act==='SAME_TRADE') badgeHtml = '<span class="badge badge-green">LONG FILLED</span>';
  else badgeHtml = '<span class="badge badge-osc">OSC</span>';

  let tickStripHtml;
  if (st.inOsc) {
    tickStripHtml = '<div class="bp-tick-strip"><span class="tick-count-label">BAND '+fmtPrice(st.oscLower,st.tick)+' – '+fmtPrice(st.oscUpper,st.tick)+'</span></div>';
  } else {
    const buf = st.zwBuffer || [];
    const slotsHtml = Array.from({length:ZONE_WINDOW_N},(_,i) => {
      if (i<buf.length) {
        const val=buf[i]; const col=val==='L'?'#00e676':'#ffd740';
        return '<div class="pt-slot confirmed" style="border-color:'+col+';background:'+col+'18"><div class="pt-label" style="color:'+col+'">'+val+'</div><div class="pt-price">'+(val==='L'?(st.zwAnchorLow?fmtPrice(st.zwAnchorLow,st.tick):'?'):(st.zwAnchorHigh?fmtPrice(st.zwAnchorHigh,st.tick):'?'))+'</div></div>';
      }
      if (i===buf.length&&st.zwAnchorLow!==null) return '<div class="pt-slot active"><div class="pt-label">?</div><div class="pt-price">—</div></div>';
      return '<div class="pt-slot"><div class="pt-label">·</div></div>';
    }).join('');
    tickStripHtml = '<div class="pt-strip">'+slotsHtml+'<span style="font-size:9px;color:var(--muted);margin-left:6px">'+buf.length+'/'+ZONE_WINDOW_K+' K-of-N</span></div>';
  }

  const priceColor = st.unrPnl>0?'green':st.unrPnl<0?'red':'';
  const priceCellLabel = !st.inOsc ? 'LIVE PRICE' : (act==='ARMED'?'PENDING ENTRY':'LIVE');
  const today = st.trades.filter(t=>t.ts>=st.sessionStart);
  const net   = today.reduce((s,t)=>s+(t.net||0),0);
  const wins  = today.filter(t=>t.outcome==='WIN').length;

  let ordersHtml = '';
  if (lng) {
    if (!lng.fillConfirmed) {
      ordersHtml = '<div class="bp-orders"><div class="bp-order-row"><span class="bp-order-label">PENDING ENTRY</span><span class="bp-order-val" style="color:#ffd740">'+fmtPrice(lng.entry,st.tick)+'</span></div><div class="bp-order-row"><span class="bp-order-label">TP / SL</span><span class="bp-order-val">'+fmtPrice(lng.target,st.tick)+' / '+fmtPrice(lng.sl,st.tick)+'</span></div></div>';
    } else {
      ordersHtml = '<div class="bp-orders"><div class="bp-order-row"><span class="bp-order-label">LONG IN TRADE</span><span class="bp-order-val" style="color:#00e676">E='+fmtPrice(lng.fillPrice||lng.entry,st.tick)+'</span></div><div class="bp-order-row"><span class="bp-order-label">TP / SL</span><span class="bp-order-val">'+fmtPrice(lng.target,st.tick)+' / '+fmtPrice(lng.sl,st.tick)+'</span></div><div class="bp-order-row"><span class="bp-order-label">UNREALIZED PNL</span><span class="bp-order-val" style="color:'+(st.unrPnl>=0?'#00e676':'#ff3d3d')+'">'+fmtPnl(st.unrPnl)+'</span></div></div>';
    }
  }

  // ── Best trading hours pill row ──────────────────────────────────────────
  const curH      = edtHour();
  const inSession = cfg.bestHours.includes(curH);
  const pillsHtml = cfg.bestHours.map(bh => {
    const isCur = bh === curH;
    return '<span class="best-hour-pill'+(isCur?' active':'')+'">'+
           (isCur ? '★ ' : '')+String(bh).padStart(2,'0')+':00</span>';
  }).join('');
  const bestHoursHtml =
    '<div class="best-hours-section">' +
      '<div class="best-hours-label">BEST TRADING HOURS (EDT)' +
        '<span class="'+(inSession?'sess-in':'sess-out')+'">'+(inSession?'✓ IN SESSION':'⛔ OFF HOURS')+'</span>' +
      '</div>' +
      '<div class="best-hours-pills">'+pillsHtml+'</div>' +
    '</div>';

  // ── Day range from candles ────────────────────────────────────────────────
  const dr = st.dayRange || 0;

  const dataEl = document.getElementById('card_data_'+sym);
  if (!dataEl) return;
  dataEl.innerHTML =
    '<div class="bp-header"><div class="bp-token">'+cfg.label+'</div><div class="bp-badges">'+badgeHtml+'</div></div>' +
    '<div class="bp-grid">' +
      '<div class="bp-cell"><div class="bp-cell-label">'+priceCellLabel+'</div><div class="bp-cell-value '+priceColor+'">'+fmtPrice(st.lastPrice,st.tick)+'</div><div class="candle-cd" id="candle-cd-'+sym+'">—</div></div>' +
      '<div class="bp-cell"><div class="bp-cell-label">SESSION P&L</div><div class="bp-cell-value '+(net>=0?'green':'red')+'">'+fmtPnl(net)+'</div></div>' +
      '<div class="bp-cell"><div class="bp-cell-label">WIN RATE</div><div class="bp-cell-value">'+(today.length?Math.round(wins/today.length*100)+'%':'--')+'</div></div>' +
      '<div class="bp-cell"><div class="bp-cell-label">DAY RANGE</div><div class="bp-cell-value cyan">'+(dr>0?dr.toFixed(1)+'%':'--')+'</div></div>' +
    '</div>' +
    ordersHtml + tickStripHtml +
    '<div class="bp-footer"><div class="bp-pnl" style="color:var(--muted)">$'+cfg.notional.toLocaleString()+' · '+cfg.leverage+'x · LONG-ONLY · '+st.bandConfirmCount+' bands · '+today.length+' trades</div></div>' +
    bestHoursHtml;
}

function renderDiag(sym) {
  const el = document.getElementById('diagLog_'+sym);
  if (!el) return;
  const log = diagLogs[sym] || [];
  const ts  = document.getElementById('diagTs_'+sym);
  if (ts) ts.textContent = fmtTime(Date.now())+' · '+log.length+' entries';
  el.innerHTML = log.slice(-80).reverse().map(d =>
    '<div class="dline"><span class="dstep">'+d.step+'</span><span class="dlabel">'+d.label+'</span><span class="dval '+d.cls+'">'+d.val+'</span><span class="diag-ts">'+d.ts+'</span></div>'
  ).join('') || '<div style="color:#4a6272;padding:8px 0">Waiting for first poll…</div>';
}

function renderFullLog() {
  const today = SYMBOLS.flatMap(s => state[s].trades.filter(t=>t.ts>=state[s].sessionStart))
                       .sort((a,b)=>b.ts-a.ts);
  const wins  = today.filter(t=>t.outcome==='WIN').length;
  const net   = today.reduce((s,t)=>s+(t.net||0),0);
  document.getElementById('logSummary').textContent = today.length+' trades · '+wins+' W · '+fmtPnl(net);
  document.getElementById('fullTradeLog').innerHTML = today.length
    ? today.map(t =>
        '<div class="trade-row '+(t.outcome==='WIN'?'win':'loss')+'" onclick="openDetail(\''+t.id+'\')">'+
          '<div><div style="font-weight:700">'+t.sym+' '+t.direction+'</div><div style="color:var(--muted);font-size:10px">'+t.timeOpen+'</div></div>'+
          '<div style="text-align:right"><div style="color:'+(t.net>=0?'var(--green)':'var(--red)')+'">'+fmtPnl(t.net)+'</div><div style="font-size:10px;color:var(--muted)">'+t.exitReason+'</div></div>'+
        '</div>'
      ).join('')
    : '<div style="color:var(--muted);padding:20px;text-align:center">No trades yet</div>';
}

function openDetail(id) {
  const t = allTrades.find(t=>t.id===id);
  if (!t) return;
  currentDetailId = id;
  const dv = document.getElementById('detailView');
  dv.classList.add('open');
  document.getElementById('detailContent').innerHTML =
    '<div style="font-family:Bebas Neue,sans-serif;font-size:24px;letter-spacing:2px;color:'+(t.outcome==='WIN'?'var(--green)':'var(--red)')+'">'+t.outcome+'</div>' +
    [['Symbol',t.sym],['Direction',t.direction],['Entry',fmtPrice(t.entry,state[t.sym].tick)],
     ['Exit',fmtPrice(t.exit,state[t.sym].tick)],['Reason',t.exitReason],
     ['Gross P&L',fmtPnl(t.gross)],['Fees',fmtPnl(t.fees)],['Net',fmtPnl(t.net)],
     ['Hold',t.holdMinutes+'min'],['Opened',t.timeOpen],['Closed',t.timeClose]
    ].map(([l,v])=>'<div class="fill-row"><span style="color:var(--muted)">'+l+'</span><span>'+v+'</span></div>').join('');
}
function closeDetail() {
  document.getElementById('detailView').classList.remove('open');
}

function updateSimBanner() {
  const el = document.getElementById('simBanner');
  if (!el) return;
  if (pollerStopped) {
    el.style.display='flex'; el.className='sim-banner complete';
    el.innerHTML = '<span>SESSION COMPLETE · auto-stopped 09:00 EDT</span><span>Export data above</span>';
    return;
  }
  if (!sessionRunning || !sessionStartTs) { el.style.display='none'; return; }
  const elMs = Date.now()-sessionStartTs;
  const h=Math.floor(elMs/3600000), m=Math.floor((elMs%3600000)/60000);
  el.style.display='flex'; el.className='sim-banner';
  el.innerHTML = '<span><span class="live-dot"></span>LIVE · running '+h+'h '+m+'m</span><span>DEMO MODE · FIL + ATOM · LONG-ONLY</span>';
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab,.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelector('[onclick="switchTab(\''+name+'\')"]').classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if (name==='trades') renderFullLog();
  if (name==='diag') SYMBOLS.forEach(renderDiag);
}

function buildApiStrip(sym) {
  const cfg = TOKEN_CONFIG[sym];
  return (
    '<div class="card-api-strip disabled" id="card_api_'+sym+'">'+
      '<div class="card-api-top">'+
        '<label class="api-toggle-wrap" title="Enable to send real '+cfg.label+' orders to MEXC demo account">'+
          '<input type="checkbox" id="apiToggle_'+sym+'" onchange="toggleApi(\''+sym+'\')">'+
          '<span class="api-toggle-track"><span class="api-toggle-thumb"></span></span>'+
          '<span class="api-toggle-label" id="apiToggleLabel_'+sym+'">'+cfg.label+' API OFF · PAPER ONLY</span>'+
        '</label>'+
        '<button class="closeall-btn" id="closeAllBtn_'+sym+'" onclick="emergencyCloseAll(\''+sym+'\')" disabled title="Enable API first">⚠ CLOSE ALL</button>'+
      '</div>'+
      '<div class="api-row"><span class="api-row-label">Connection</span><span class="api-row-val" id="apiConn_'+sym+'">DISABLED · toggle to enable</span></div>'+
      '<div class="api-row"><span class="api-row-label">Entry Order</span><span class="api-row-val" id="api_'+sym+'_EntryId">—</span></div>'+
      '<div class="api-row"><span class="api-row-label">TP / SL Plan</span><span class="api-row-val" id="api_'+sym+'_TpId">—</span> / <span class="api-row-val" id="api_'+sym+'_SlId">—</span></div>'+
      '<div class="api-row"><span class="api-row-label">Last Event</span><span class="api-row-val" id="api_'+sym+'_LastEvent">API disabled</span></div>'+
    '</div>'
  );
}

function buildCards() {
  document.getElementById('tickerCards').innerHTML =
    SYMBOLS.map(s =>
      '<div class="ticker-card border-wait" id="card_'+s+'">'+
        buildApiStrip(s)+
        '<div id="card_data_'+s+'"></div>'+
      '</div>'
    ).join('');
  document.getElementById('diagCards').innerHTML = SYMBOLS.map(s =>
    '<div class="diag-card">'+
      '<div class="diag-header">'+
        '<div><div class="diag-title">'+TOKEN_CONFIG[s].label+' DIAGNOSTIC LOG</div>'+
        '<div class="diag-subtitle" id="diagTs_'+s+'">—</div></div>'+
        '<div class="diag-controls">'+
          '<button class="diag-btn" id="diagToggleBtn_'+s+'" onclick="toggleDiag(\''+s+'\')">Stop Log</button>'+
          '<button class="diag-btn" onclick="exportDiagCSV()">↓ CSV</button>'+
        '</div>'+
      '</div>'+
      '<div class="diag-log" id="diagLog_'+s+'"><div style="color:#4a6272;padding:8px 0">Waiting for first poll…</div></div>'+
    '</div>'
  ).join('');
}

function toggleDiag(sym) {
  diagEnabled = !diagEnabled;
  const btn = document.getElementById('diagToggleBtn_'+sym);
  if (btn) { btn.textContent = diagEnabled?'Stop Log':'Start Log'; btn.classList.toggle('active',diagEnabled); }
}

// ── CLEAR / RESTART ───────────────────────────────────────────────────────────
function clearDiag() { SYMBOLS.forEach(sym => { diagLogs[sym] = []; renderDiag(sym); }); }

function clearAll() {
  pollerStopped = false; sessionRunning = false;
  SYMBOLS.forEach(s => {
    const st = state[s];
    st.candles=[]; st.zwAnchorLow=null; st.zwAnchorHigh=null;
    st.zwBuffer=[]; st.zwLowCount=0; st.zwHighCount=0; st.zwLastTs=0;
    st.zwHeldTs=null; st.zwLastReset=null;
    st.inOsc=false; st.oscLower=0; st.oscUpper=0;
    st.bandConfirmCount=0; st.cycleTradeCount=0; st.tpCounter=0;
    st.openLong=null; st.activeDir='LONG'; st.action='WAIT';
    st.inDrift=false; st.shadowBuffer=[]; st.shadowCount=0;
    st.shadowPrice1=null; st.shadowPrice2=null; st.displayPrice=0; st.unrPnl=0;
    // reset API order IDs
    st.apiEntryOrderId=null; st.apiTpOrderId=null; st.apiSlOrderId=null;
    localStorage.removeItem('fil_api_trades_v1');
  });
  allTrades = [];
  sessionStartTs  = Date.now();
  sessionStartEdtH = edtHour();
  sessionRunning  = true;
  pollerStopped   = false;
  diagEnabled     = true;
  // reset per-symbol API status display
  SYMBOLS.forEach(sym => {
    ['EntryId','TpId','SlId'].forEach(f => setApiStatus(sym, f, '—', ''));
    const lastEl = document.getElementById('api_'+sym+'_LastEvent');
    if (lastEl) lastEl.textContent = '—';
  });
  clearDiag();
  renderCombined();
  SYMBOLS.forEach(renderTicker);
  renderFullLog();
  updateSimBanner();
  schedulePoll();
}

// ── POLL LOOP ─────────────────────────────────────────────────────────────────
async function poll() {
  await Promise.all(SYMBOLS.map(async sym => {
    try { await processSym(sym); }
    catch(e) { dp(sym, 'poll.ERR', 'JS ERROR', e.message||String(e), 'bad'); }
    renderTicker(sym);
  }));
  renderCombined();
  SYMBOLS.forEach(sym => renderDiag(sym));
  if (document.getElementById('tab-trades').classList.contains('active')) renderFullLog();
}

function nextPollMs() {
  // Use fastest needed interval across all active symbols
  for (const sym of SYMBOLS) {
    const lng = state[sym].openLong;
    if (lng && lng.fillConfirmed)  return POLL_FILLED;
    if (lng && !lng.fillConfirmed) return POLL_ARMED;
  }
  return POLL_DETECT;
}

async function schedulePoll() {
  if (pollerStopped) return;
  await poll();
  if (sessionRunning && edtHour() >= SESSION_END_H && sessionStartEdtH < SESSION_END_H) {
    pollerStopped = true; sessionRunning = false;
    updateSimBanner();
    document.getElementById('downloadModal').classList.add('open');
    return;
  }
  updateSimBanner();
  setTimeout(schedulePoll, nextPollMs());
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildCards();
SYMBOLS.forEach(renderTicker);
setInterval(renderClock, 1000);
setInterval(renderSession, 60000);
renderClock(); renderSession();

// Per-symbol: connection rows already initialised by buildApiStrip — nothing extra needed.

sessionStartTs   = Date.now();
sessionStartEdtH = edtHour();
sessionRunning   = true;
pollerStopped    = false;
schedulePoll();
</script>
</body>
</html>
